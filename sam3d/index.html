<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FURNAI Studio</title>
  <link rel="stylesheet" href="static/styles.css" />
  <!-- Google Fonts for Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- Header with Glassmorphism -->
    <header>
      <h1>FURNAI <span style="font-weight:300; opacity:0.7;">Studio</span></h1>
      <button id="toggle-drawer-btn" class="btn-icon-text">
        <span>📦 Generated Furniture</span>
      </button>
    </header>

    <main>
      <!-- Central Viewport -->
      <div id="viewer-area">
        
        <!-- Canvas Container -->
        <div id="canvas-wrapper">
          <div id="loading-overlay">
            <div class="spinner"></div>
            <span id="loading-text">Processing...</span>
          </div>
          <canvas id="image-canvas"></canvas>
          <canvas id="overlay-canvas" style="position:absolute; top:0; left:0; pointer-events:none;"></canvas>
          
          <!-- Empty State / Drop Zone (Visible when no image) -->
          <div id="drop-zone" style="display:flex; flex-direction:column; align-items:center; justify-content:center; padding:4rem; text-align:center; color:rgba(255,255,255,0.5);">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:1rem; opacity:0.5;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            <p>Drag & Drop an image here</p>
            <p style="font-size:0.8rem; margin-top:0.5rem;">or use the upload button below</p>
          </div>
        </div>

        <!-- Floating Controls Bar -->
        <div id="controls-bar">
          <label for="image-input" class="btn-icon-text btn-primary">
            <span>📷 Upload Image</span>
          </label>
          <input type="file" id="image-input" accept="image/*" />

          <div style="width:1px; background:var(--glass-border); margin:0 0.5rem;"></div>

          <button id="segment-btn" class="btn-icon-text" disabled>
            <span>✨ Auto Segment</span>
          </button>
          
          <button id="reconstruct-btn" class="btn-icon-text btn-primary" disabled>
            <span>🎲 Generate 3D</span>
          </button>
        </div>
      </div>

      <!-- Side Drawer for Results -->
      <aside id="side-drawer">
        <div class="drawer-header">
          <h2>Furniture Library</h2>
          <button id="close-drawer-btn" class="close-btn">&times;</button>
        </div>
        
        <div class="drawer-content">
          <div id="drawer-empty-state" style="text-align:center; padding:2rem; opacity:0.5; font-size:0.9rem;">
            No 3D models generated yet.<br>Select an object and click "Generate 3D".
          </div>
          <div id="generated-list">
            <!-- Items like this will be injected: -->
            <!-- 
            <div class="model-card">
              <div class="model-preview">
                <model-viewer ...></model-viewer>
              </div>
              <div class="model-info">
                <h3>Chair_01</h3>
                <div class="model-actions">
                  <a href="#" class="btn-sm">Download GLB</a>
                  <button class="btn-sm">Add to Scene</button>
                </div>
              </div>
            </div> 
            -->
          </div>
        </div>
      </aside>
    </main>
    
    <!-- Toast Container -->
    <div id="toast-container"></div>
  </div>

  <!-- Scripts -->
  <script src="static/config.js"></script>
  <!-- Model Viewer for 3D Previews -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <script src="static/app.js"></script>
</body>
</html>
