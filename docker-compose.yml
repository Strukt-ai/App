version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      BACKEND_DIRECT_CALL: "true"
      ENABLE_PYTHON_SUBPROCESS: "true"
      PYTHON_EXECUTABLE: /usr/bin/python3
      NEXT_PUBLIC_API_URL: http://localhost:3000/api
      NEXT_PUBLIC_BACKEND_URL: direct://
    volumes:
      - ./backend:/app/backend
      - ./app:/app/app
    depends_on:
      - postgres
      - redis
    networks:
      - strukt

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: strukt
      POSTGRES_PASSWORD: strukt-dev-password
      POSTGRES_DB: strukt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - strukt

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - strukt

volumes:
  postgres_data:
  redis_data:

networks:
  strukt:
    driver: bridge
